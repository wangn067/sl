<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>申论答题纸格式楷体字帖生成器</title>
  <style>
    :root {
      --grid-color: #e4a0a0;
      --ink-color: #111;
      --paper-bg: #fff;
      --cols: 25;
      --rows: 24;
      /* 按 A4 纸重新设计：25 格横向铺满主体区域，每格约 7.4mm */
      /* 浏览器打印会有轻微缩放：这里按补偿值设置，实测打印约为 7mm × 8mm */
      --cell-width: 8mm;
      --cell-height: 9mm;
      --row-gap: 2.9mm;
      --font-size: 5.7mm;
      --char-offset: 0.8mm;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f3f4f6;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .app {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: 100vh;
    }

    .panel {
      background: #fff;
      border-right: 1px solid #e5e7eb;
      padding: 22px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .panel h1 {
      margin: 0 0 8px;
      font-size: 21px;
      line-height: 1.35;
    }

    .desc {
      margin: 0 0 18px;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.7;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 13px;
      font-weight: 700;
      color: #374151;
    }

    textarea, input, select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    textarea:focus, input:focus, select:focus {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12);
    }

    textarea {
      min-height: 390px;
      resize: vertical;
      line-height: 1.7;
      font-family: "Microsoft YaHei", sans-serif;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }

    .primary { background: #dc2626; color: #fff; }
    .secondary { background: #fee2e2; color: #991b1b; }

    .hint {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 12px;
      line-height: 1.65;
    }

    .preview-wrap {
      padding: 28px;
      overflow: auto;
    }

    .toolbar-note {
      max-width: 820px;
      margin: 0 auto 18px;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.6;
    }

    .pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .page {
      width: 210mm;
      height: 297mm;
      background: var(--paper-bg);
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
      /* A4 答题纸主体边距：左右约 11mm，上方约 17mm */
      padding: 8mm 5mm 4mm;
      position: relative;
      break-after: page;
      page-break-after: always;
    }

    .answer-sheet {
      width: max-content;
      margin: 0 auto;
      display: grid;
      grid-template-rows: repeat(var(--rows), var(--cell-height));
      row-gap: var(--row-gap);
      position: relative;
    }

    .grid-row {
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--cell-width));
      border-top: 1px solid var(--grid-color);
      border-left: 1px solid var(--grid-color);
      position: relative;
    }

    .cell {
      width: var(--cell-width);
      height: var(--cell-height);
      border-right: 1px solid var(--grid-color);
      border-bottom: 1px solid var(--grid-color);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: var(--char-offset);
      color: var(--ink-color);
      font-family: KaiTi, STKaiti, "楷体", "华文楷体", serif;
      font-size: var(--font-size);
      font-weight: 500;
      line-height: 1;
      overflow: hidden;
      white-space: pre;
    }

    .cell.space { color: transparent; }

    .count-mark {
      position: absolute;
      right: 26px;
      bottom: -10px;
      font-size: 7px;
      line-height: 1;
      color: #111;
      font-family: Arial, sans-serif;
      font-weight: 700;
      background: transparent;
      pointer-events: none;
    }

    .page-no {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 18px;
      text-align: center;
      color: #777;
      font-size: 11px;
      font-family: KaiTi, STKaiti, "楷体", serif;
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .panel {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid #e5e7eb;
      }
      .preview-wrap { padding: 14px; }
      .page {
        transform: scale(0.88);
        transform-origin: top center;
        margin-bottom: -120px;
      }
    }

    @page { size: A4 portrait; margin: 0; }

    @media print {
      body { background: #fff; }
      .panel, .toolbar-note { display: none !important; }
      .app { display: block; }
      .preview-wrap { padding: 0; overflow: visible; }
      .pages { display: block; }
      .page {
        width: 210mm;
        height: 297mm;
        box-shadow: none;
        margin: 0;
        padding: 8mm 5mm 4mm;
        break-after: page;
        page-break-after: always;
      }
      .page:last-child { page-break-after: auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>申论答题纸格式字帖</h1>
      <p class="desc">已按你的实测结果做打印补偿：代码里设置为 8mm × 9mm，实际打印目标约为 7mm × 8mm；每页 25 格 × 24 行 = 600 字。</p>

      <div class="row">
        <div>
          <label for="fontInput">楷体字号</label>
          <input id="fontInput" type="number" min="4" max="8" step="0.1" value="5.7" />
        </div>
        <div>
          <label for="offsetInput">字下沉</label>
          <input id="offsetInput" type="number" min="0" max="2" step="0.1" value="0.8" />
        </div>
      </div>

      <div class="row">
        <div>
          <label for="gridColorInput">格子颜色</label>
          <input id="gridColorInput" type="color" value="#e4a0a0" />
        </div>
        <div>
          <label for="showPageNoInput">页码</label>
          <select id="showPageNoInput">
            <option value="yes">显示</option>
            <option value="no">不显示</option>
          </select>
        </div>
      </div>

      <label for="contentInput">粘贴正文内容</label>
      <textarea id="contentInput">执稳“三支笔” 书写【主题】高分卷
开头
钱塘潮涌，浩浩其势；之江奔流，……。（生生不息、郁郁乎文、奋楫争先）在“八八战略”指引下，【主题】是浙江高质量发展、建设共同富裕示范区的核心命题。从【案例A】到【案例B】，再到【案例C】，浙江始终以先行之姿，书写【主题】的时代篇章。
过渡段
习近平总书记强调：“【引用金句】”省委锚定“重要窗口”使命，将其作为服务中国式现代化的关键抓手。当前，我省仍存在【痛点A】、【痛点B】等短板（或者用当前……发展步入攻坚深水区）。</textarea>

      <div class="btns">
        <button class="primary" onclick="renderCopybook()">生成字帖</button>
        <button class="secondary" onclick="window.print()">打印 / 导出 PDF</button>
      </div>

      <div class="hint">
        打印建议：A4、纵向、缩放 100%、关闭页眉页脚。你实测少 1mm，所以这里已把代码尺寸补偿到 8mm × 9mm，打印出来更接近 7mm × 8mm。
      </div>
    </aside>

    <main class="preview-wrap">
      <div class="toolbar-note">右侧为打印预览。格式固定为申论答题纸格子：25 格 × 24 行，右侧每 100 字有数字标记。</div>
      <section id="pages" class="pages"></section>
    </main>
  </div>

  <script>
    const contentInput = document.getElementById('contentInput');
    const fontInput = document.getElementById('fontInput');
    const offsetInput = document.getElementById('offsetInput');
    const gridColorInput = document.getElementById('gridColorInput');
    const showPageNoInput = document.getElementById('showPageNoInput');
    const pagesEl = document.getElementById('pages');

    const COLS = 25;
    const ROWS = 24;
    const CHARS_PER_PAGE = COLS * ROWS;

    function normalizeText(text) {
      return text
        .replace(/\r\n/g, '\n')
        .replace(/\r/g, '\n')
        .replace(/[ \t]+/g, '')
        .trim();
    }

    function splitIntoRows(text) {
      const rawLines = normalizeText(text).split('\n');
      const rows = [];

      rawLines.forEach(rawLine => {
        if (rawLine === '') {
          rows.push([]);
          return;
        }
        const chars = Array.from(rawLine);
        for (let i = 0; i < chars.length; i += COLS) {
          rows.push(chars.slice(i, i + COLS));
        }
      });

      return rows;
    }

    function makeCell(char) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (!char) {
        cell.classList.add('space');
        cell.textContent = '';
      } else {
        cell.textContent = char;
      }
      return cell;
    }

    function makePage(pageRows, pageIndex) {
      const page = document.createElement('article');
      page.className = 'page';

      const sheet = document.createElement('div');
      sheet.className = 'answer-sheet';

      for (let r = 0; r < ROWS; r++) {
        const row = document.createElement('div');
        row.className = 'grid-row';
        const line = pageRows[r] || [];

        for (let c = 0; c < COLS; c++) {
          row.appendChild(makeCell(line[c] || ''));
        }

        const globalRowNumber = pageIndex * ROWS + r + 1;
        const countInPage = (r + 1) * COLS;
        if (countInPage % 100 === 0) {
          const mark = document.createElement('span');
          mark.className = 'count-mark';
          mark.textContent = String(countInPage);
          row.appendChild(mark);
        }

        sheet.appendChild(row);
      }

      page.appendChild(sheet);

      if (showPageNoInput.value === 'yes') {
        const pageNo = document.createElement('div');
        pageNo.className = 'page-no';
        pageNo.textContent = `第${pageIndex + 1}页`;
        page.appendChild(pageNo);
      }

      return page;
    }

    function renderCopybook() {
      const font = Number(fontInput.value) || 5.7;
      const offset = Number(offsetInput.value) || 0.8;
      const gridColor = gridColorInput.value || '#e4a0a0';

      document.documentElement.style.setProperty('--font-size', `${font}mm`);
      document.documentElement.style.setProperty('--char-offset', `${offset}mm`);
      document.documentElement.style.setProperty('--grid-color', gridColor);

      const rows = splitIntoRows(contentInput.value);
      const pageCount = Math.max(1, Math.ceil(rows.length / ROWS));
      pagesEl.innerHTML = '';

      for (let p = 0; p < pageCount; p++) {
        const pageRows = rows.slice(p * ROWS, (p + 1) * ROWS);
        pagesEl.appendChild(makePage(pageRows, p));
      }
    }

    [contentInput, fontInput, offsetInput, gridColorInput, showPageNoInput].forEach(el => {
      el.addEventListener('input', renderCopybook);
      el.addEventListener('change', renderCopybook);
    });

    renderCopybook();
  </script>
</body>
</html>
